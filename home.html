<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWise - Net Worth Calculator</title>
    <link rel="stylesheet" href="home.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Alumni+Sans+SC:ital,wght@0,100..900;1,100..900&family=Gochi+Hand&family=Mate+SC&family=Orbitron:wght@400..900&display=swap"
        rel="stylesheet">
</head>
<body>
    <div id="netwise">NETWISE</div>
    <div id="name"></div>
    
    <div class="container">
        <div class="box">
            <h3>Assets</h3>
            <div id="assets-list"></div>
            <button class="add-btn" onclick="showAddAsset()">+ Add Asset</button>
        </div>
        
        <div class="box">
            <h3>Liabilities</h3>
            <div id="liabilities-list"></div>
            <button class="add-btn" onclick="showAddLiability()">+ Add Liability</button>
        </div>
    </div>
    
    <div id="networth">
        <div class="networth-row">
            <div class="networth-item">
                <h3>Your Salary</h3>
                <p id="salary">$0.00</p>
            </div>
            <div class="networth-item">
                <h3>Your Total Net Worth</h3>
                <p id="net">$0.00</p>
            </div>
        </div>
    </div>

    <div id="assetModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAssetModal()">&times;</span>
            <h3>Add Asset</h3>
            <input type="text" id="assetName" placeholder="Asset Name" required>
            <input type="number" id="assetAmount" placeholder="Amount" min="0" step="0.01" required>
            <button onclick="addAsset()">Add Asset</button>
        </div>
    </div>

    <div id="liabilityModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeLiabilityModal()">&times;</span>
            <h3>Add Liability</h3>
            <input type="text" id="liabilityName" placeholder="Liability Name" required>
            <input type="number" id="liabilityAmount" placeholder="Amount" min="0" step="0.01" required>
            <button onclick="addLiability()">Add Liability</button>
        </div>
    </div>

    <script src="home.js"></script>
</body>
</html>
